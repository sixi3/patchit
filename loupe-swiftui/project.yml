name: LoupeSwiftUI
options:
  bundleIdPrefix: com.sixi3
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
targets:
  LoupeSwiftUI:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Loupe
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSCameraUsageDescription: Loupe scans the pairing QR code shown by the Mac daemon.
        NSLocalNetworkUsageDescription: Loupe connects to the Loupe daemon running on your Mac over your local network.
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sixi3.loupe.swiftui
        PRODUCT_NAME: LoupeSwiftUI
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  LoupeSwiftUI:
    build:
      targets:
        LoupeSwiftUI: all
    run:
      config: Debug
