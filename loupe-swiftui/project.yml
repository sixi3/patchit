name: LoupeSwiftUI
options:
  bundleIdPrefix: com.sixi3
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
targets:
  LoupeSwiftUI:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sixi3.loupe.swiftui
        PRODUCT_NAME: LoupeSwiftUI
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Loupe
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  LoupeSwiftUI:
    build:
      targets:
        LoupeSwiftUI: all
    run:
      config: Debug
