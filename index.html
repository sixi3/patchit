<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Loupe">
  <title>Loupe</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090b;
      --panel: #0e1014;
      --panel-2: #141820;
      --panel-3: #1b2029;
      --line: #242a33;
      --line-hot: #3a4350;
      --text: #f5f0df;
      --muted: #8f98a6;
      --dim: #59616d;
      --green: #7ee787;
      --blue: #79c0ff;
      --yellow: #f2cc60;
      --red: #ff7b72;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.44);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    html, body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    button, input, select, textarea { font: inherit; }
    button, select { cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        radial-gradient(circle at 50% 18%, rgba(242, 204, 96, 0.07), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.025), transparent 260px),
        var(--bg);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(8, 9, 11, 0.92);
      backdrop-filter: blur(18px);
    }

    .bar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-hot);
      border-radius: 7px;
      background: #0b0d10;
      color: var(--yellow);
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 760;
    }

    h1, h2, h3, p { margin: 0; }

    .brand h1 {
      color: var(--text);
      font-size: 16px;
      line-height: 1;
      font-weight: 740;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      white-space: nowrap;
    }

    .pill.online { color: var(--green); border-color: rgba(126, 231, 135, 0.32); }
    .pill.running { color: var(--blue); border-color: rgba(121, 192, 255, 0.32); }
    .pill.failed { color: var(--red); border-color: rgba(255, 123, 114, 0.32); }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 18%, transparent);
    }

    .session-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 14px 0;
      scrollbar-width: thin;
    }

    .session-card {
      min-width: min(320px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(14, 16, 20, 0.92);
      color: var(--text);
      padding: 12px;
      text-align: left;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03) inset;
    }

    .session-card.active {
      border-color: rgba(242, 204, 96, 0.42);
      background: #14120b;
    }

    .session-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .session-title {
      font-size: 13px;
      line-height: 1.25;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-meta {
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-chip {
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 7px;
      font-family: var(--mono);
      font-size: 10px;
      white-space: nowrap;
    }

    .status-chip.running { color: var(--blue); border-color: rgba(121, 192, 255, 0.36); }
    .status-chip.completed { color: var(--green); border-color: rgba(126, 231, 135, 0.34); }
    .status-chip.failed { color: var(--red); border-color: rgba(255, 123, 114, 0.34); }

    .home {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 24px 18px;
    }

    .hero {
      width: min(720px, 100%);
      text-align: center;
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    .hero h2 {
      color: var(--text);
      font-size: clamp(34px, 8vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.025em;
      font-weight: 760;
    }

    .workspace-inline {
      display: inline-grid;
      grid-template-columns: auto;
      vertical-align: middle;
      margin: 4px 0 0;
    }

    .workspace-select {
      max-width: min(520px, calc(100vw - 34px));
      min-height: 54px;
      color: var(--yellow);
      border: 1px solid rgba(242, 204, 96, 0.34);
      border-radius: 8px;
      background: #10100c;
      padding: 0 16px;
      font-size: clamp(22px, 6vw, 44px);
      font-weight: 760;
      letter-spacing: -0.02em;
      outline: 0;
      text-align: center;
      text-align-last: center;
    }

    .hero-copy {
      max-width: 520px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
    }

    .usage-strip {
      width: min(520px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .usage-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(14, 16, 20, 0.78);
      padding: 11px 12px;
      text-align: left;
    }

    .usage-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .usage-label {
      color: var(--muted);
    }

    .usage-reset {
      color: var(--dim);
      white-space: nowrap;
    }

    .usage-value {
      color: var(--text);
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 780;
      line-height: 1;
    }

    .usage-bar {
      height: 5px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--panel-3);
    }

    .usage-fill {
      width: var(--usage-left, 0%);
      height: 100%;
      border-radius: inherit;
      background: var(--green);
    }

    .usage-card.low .usage-fill { background: var(--red); }
    .usage-card.medium .usage-fill { background: var(--yellow); }

    .workspace-tools {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(14, 16, 20, 0.75);
      text-align: left;
      overflow: hidden;
    }

    .workspace-tools summary {
      padding: 12px 13px;
      cursor: pointer;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      list-style: none;
    }

    .workspace-tools summary::-webkit-details-marker { display: none; }

    .fs-panel {
      display: grid;
      gap: 9px;
      padding: 0 12px 12px;
    }

    .fs-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .fs-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .fs-input {
      width: 100%;
      min-height: 38px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 0 10px;
      font-family: var(--mono);
      font-size: 12px;
      outline: 0;
    }

    .mini-btn {
      min-height: 38px;
      border: 1px solid var(--line-hot);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 10px;
      font-family: var(--mono);
      font-size: 12px;
      white-space: nowrap;
    }

    .mini-btn.primary {
      border-color: rgba(242, 204, 96, 0.5);
      background: #f2cc60;
      color: #101216;
      font-weight: 800;
    }

    .folder-list {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
    }

    .folder-chip {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      padding: 0 10px;
      font-family: var(--mono);
      font-size: 11px;
      white-space: nowrap;
    }

    .meta {
      min-width: 0;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .composer {
      position: sticky;
      bottom: 0;
      z-index: 30;
      border-top: 1px solid var(--line);
      background: rgba(8, 9, 11, 0.94);
      backdrop-filter: blur(18px);
      padding: 12px 14px max(12px, env(safe-area-inset-bottom));
    }

    .composer-inner {
      width: min(880px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .harness-row {
      width: min(880px, 100%);
      margin: 0 auto 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .harness-label {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      margin-right: 4px;
    }

    .harness-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 11px;
      border: 1px solid var(--line-hot);
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0;
    }

    .harness-pill.active {
      border-color: rgba(242, 204, 96, 0.7);
      background: rgba(242, 204, 96, 0.12);
      color: var(--text);
    }

    .harness-pill[disabled],
    .harness-pill.unavailable {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .harness-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--dim);
    }

    .harness-pill.active .dot { background: var(--yellow); }
    .harness-pill.unavailable .dot { background: var(--red); }

    textarea {
      width: 100%;
      min-height: 96px;
      max-height: 220px;
      resize: vertical;
      border: 1px solid var(--line-hot);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      padding: 15px 14px;
      outline: 0;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.45;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03) inset;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(242, 204, 96, 0.65);
      box-shadow: 0 0 0 2px rgba(242, 204, 96, 0.1);
    }

    .send {
      width: 62px;
      min-height: 96px;
      border: 1px solid rgba(242, 204, 96, 0.5);
      border-radius: 10px;
      background: #f2cc60;
      color: #101216;
      font-size: 23px;
      font-weight: 900;
    }

    .send:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .hint {
      width: min(880px, 100%);
      margin: 8px auto 0;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
    }

    .session-view {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--bg);
    }

    .session-header {
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(8, 9, 11, 0.94);
      backdrop-filter: blur(18px);
    }

    .session-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .back-btn {
      min-height: 36px;
      border: 1px solid var(--line-hot);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 12px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .session-heading {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .session-heading h2 {
      font-size: 16px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .session-tab {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .session-tab.active {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--line-hot);
    }

    .session-body {
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 12px;
      scrollbar-width: thin;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      display: grid;
      gap: 7px;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
    }

    .item-body {
      color: #dfe5ed;
      font-size: 13px;
      line-height: 1.48;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .file-path {
      color: var(--yellow);
      font-family: var(--mono);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .action-command {
      color: var(--blue);
      font-family: var(--mono);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      font-family: var(--mono);
      font-size: 12px;
      text-align: center;
    }

    .toast {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) translateY(-140%);
      z-index: 80;
      width: min(520px, calc(100vw - 28px));
      border: 1px solid var(--line-hot);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      box-shadow: var(--shadow);
      padding: 12px;
      font-size: 13px;
      line-height: 1.4;
      transition: transform 0.22s ease;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (min-width: 760px) {
      body {
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .app {
        width: min(960px, 100%);
        min-height: min(860px, calc(100vh - 56px));
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .session-view {
        inset: 28px calc((100vw - min(960px, 100%)) / 2);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
    }

    @media (max-width: 520px) {
      .hero h2 {
        font-size: 38px;
      }

      .workspace-select {
        width: 100%;
        font-size: 25px;
      }

      .composer-inner,
      .fs-actions,
      .usage-strip {
        grid-template-columns: 1fr;
      }

      .send {
        width: 100%;
        min-height: 48px;
      }

      .hint,
      .session-header-top {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="bar-row">
        <div class="brand">
          <div class="mark">~/</div>
          <div>
            <h1>loupe</h1>
            <p class="subtitle">local codex bridge</p>
          </div>
        </div>
        <div class="pill" id="daemonPill"><span class="dot"></span><span id="daemonPillText">checking</span></div>
      </div>
      <div class="session-strip" id="sessionStrip" aria-label="Sessions"></div>
    </header>

    <main class="home">
      <section class="hero">
        <h2>
          Let's get building in
          <span class="workspace-inline">
            <select class="workspace-select" id="workspaceSelect" aria-label="Workspace">
              <option>Loading...</option>
            </select>
          </span>
        </h2>
        <p class="hero-copy" id="workspacePath">Waiting for Mac daemon...</p>
        <section class="usage-strip" id="usageStrip" aria-label="Codex usage left" hidden></section>

        <details class="workspace-tools">
          <summary>workspace tools</summary>
          <section class="fs-panel" aria-label="Create workspace">
            <div class="fs-row">
              <button class="mini-btn" id="homeFolder" type="button">home</button>
              <button class="mini-btn" id="parentFolder" type="button">up</button>
              <div class="meta" id="currentFolder">Loading folders...</div>
            </div>
            <div class="fs-actions">
              <input class="fs-input" id="pathInput" placeholder="Jump to path, e.g. /Users/anandmenon/Documents">
              <button class="mini-btn" id="jumpFolder" type="button">go</button>
            </div>
            <div class="folder-list" id="folderList" aria-label="Folders"></div>
            <div class="fs-actions">
              <input class="fs-input" id="newWorkspaceName" placeholder="New folder name, e.g. mobile-agent-demo">
              <button class="mini-btn primary" id="createWorkspace" type="button">create workspace</button>
            </div>
          </section>
        </details>
      </section>
    </main>

    <footer class="composer">
      <div class="harness-row" id="harnessRow" aria-label="Agent harness">
        <span class="harness-label">agent</span>
      </div>
      <form class="composer-inner" id="chatForm">
        <textarea id="messageInput" placeholder="Ask the agent to inspect, explain, or change this workspace...">Reply with one sentence confirming this request reached the agent on my Mac. Do not edit files.</textarea>
        <button class="send" id="sendButton" aria-label="Send message">↵</button>
      </form>
      <div class="hint">
        <span id="sessionHint">No active session</span>
        <span id="phoneUrl">Open from iPhone: checking...</span>
      </div>
    </footer>
  </div>

  <section class="session-view" id="sessionView" hidden>
    <header class="session-header">
      <div class="session-header-top">
        <button class="back-btn" id="closeSession" type="button">back</button>
        <div class="session-heading">
          <h2 id="sessionTitle">Session</h2>
          <p class="session-meta" id="sessionSubtitle">No session selected</p>
        </div>
        <span class="status-chip" id="sessionStatus">idle</span>
      </div>
      <div class="session-tabs">
        <button class="session-tab active" data-session-tab="messages">messages</button>
        <button class="session-tab" data-session-tab="files">files</button>
        <button class="session-tab" data-session-tab="actions">actions</button>
      </div>
    </header>
    <main class="session-body" id="sessionBody"></main>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const state = {
      health: null,
      workspaceId: null,
      harnessId: null,
      sessions: [],
      activeSessionId: null,
      activeSessionTab: "messages",
      eventSource: null,
      running: false,
      fsPath: null,
      fsListing: null
    };

    const $ = (selector) => document.querySelector(selector);

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function toast(message) {
      const el = $("#toast");
      el.textContent = message;
      el.classList.add("show");
      window.clearTimeout(el.timer);
      el.timer = window.setTimeout(() => el.classList.remove("show"), 2600);
    }

    function selectedWorkspace() {
      return (state.health?.workspaces || []).find((workspace) => workspace.id === state.workspaceId);
    }

    function formatReset(timestampSeconds) {
      if (!timestampSeconds) return "reset unknown";
      const reset = new Date(timestampSeconds * 1000);
      const diffMs = reset.getTime() - Date.now();
      if (diffMs <= 0) return "resets now";

      const minutes = Math.round(diffMs / 60000);
      if (minutes < 60) return `resets in ${minutes}m`;

      const hours = Math.round(minutes / 60);
      if (hours < 48) return `resets in ${hours}h`;

      const days = Math.round(hours / 24);
      return `resets in ${days}d`;
    }

    function usageClass(leftPercent) {
      if (leftPercent <= 10) return "low";
      if (leftPercent <= 30) return "medium";
      return "";
    }

    function renderUsage() {
      const strip = $("#usageStrip");
      const rateLimits = state.health?.codexUsage?.rateLimits;
      const windows = [
        { label: "5h left", data: rateLimits?.primary },
        { label: "weekly left", data: rateLimits?.secondary }
      ].filter((item) => item.data);

      if (!windows.length) {
        strip.hidden = true;
        strip.innerHTML = "";
        return;
      }

      strip.hidden = false;
      strip.innerHTML = windows.map((item) => {
        const used = Math.max(0, Math.min(100, Number(item.data.used_percent) || 0));
        const left = Math.max(0, Math.round(100 - used));
        return `
          <article class="usage-card ${usageClass(left)}" style="--usage-left: ${left}%">
            <div class="usage-top">
              <span class="usage-label">${escapeHtml(item.label)}</span>
              <span class="usage-reset">${escapeHtml(formatReset(item.data.resets_at))}</span>
            </div>
            <div class="usage-value">${left}%</div>
            <div class="usage-bar" aria-hidden="true"><div class="usage-fill"></div></div>
          </article>
        `;
      }).join("");
    }

    function shortPrompt(prompt) {
      return prompt.length > 72 ? `${prompt.slice(0, 69)}...` : prompt;
    }

    function createLocalSession(prompt) {
      const workspace = selectedWorkspace();
      const session = {
        localId: `local-${Date.now()}`,
        remoteId: null,
        prompt,
        title: shortPrompt(prompt),
        status: "starting",
        workspace,
        startedAt: now(),
        messages: [
          { role: "user", label: "you", body: prompt, at: now() }
        ],
        files: [],
        actions: []
      };
      state.sessions.unshift(session);
      state.activeSessionId = session.localId;
      return session;
    }

    function activeSession() {
      return state.sessions.find((session) => session.localId === state.activeSessionId || session.remoteId === state.activeSessionId);
    }

    function renderSessions() {
      const strip = $("#sessionStrip");
      if (!state.sessions.length) {
        strip.innerHTML = "";
        return;
      }

      strip.innerHTML = state.sessions.map((session) => `
        <button class="session-card ${session.localId === state.activeSessionId || session.remoteId === state.activeSessionId ? "active" : ""}" data-session-id="${escapeHtml(session.localId)}">
          <div class="session-card-top">
            <div class="session-title">${escapeHtml(session.title)}</div>
            <span class="status-chip ${escapeHtml(session.status)}">${escapeHtml(session.status)}</span>
          </div>
          <div class="session-meta">${escapeHtml(session.harnessLabel || session.harnessId || "agent")} · ${escapeHtml(session.workspace?.name || "workspace")} · ${session.messages.length} msg · ${session.files.length} files · ${session.actions.length} actions</div>
        </button>
      `).join("");
    }

    function openSession(sessionId) {
      state.activeSessionId = sessionId;
      state.activeSessionTab = "messages";
      $("#sessionView").hidden = false;
      renderSessions();
      renderSessionView();
    }

    function closeSession() {
      $("#sessionView").hidden = true;
      renderSessions();
    }

    function renderSessionView() {
      const session = activeSession();
      if (!session) return;

      $("#sessionTitle").textContent = session.title;
      $("#sessionSubtitle").textContent = `${session.workspace?.path || "workspace"} · ${session.remoteId || session.localId}`;
      $("#sessionStatus").textContent = session.status;
      $("#sessionStatus").className = `status-chip ${session.status}`;

      document.querySelectorAll("[data-session-tab]").forEach((button) => {
        button.classList.toggle("active", button.dataset.sessionTab === state.activeSessionTab);
      });

      if (state.activeSessionTab === "messages") {
        renderItems(session.messages, (item) => `
          <article class="item">
            <div class="item-head"><span>${escapeHtml(item.label)}</span><span>${escapeHtml(item.at)}</span></div>
            <div class="item-body">${escapeHtml(item.body)}</div>
          </article>
        `, "No messages yet.");
      }

      if (state.activeSessionTab === "files") {
        renderItems(session.files, (item) => `
          <article class="item">
            <div class="item-head"><span>${escapeHtml(item.kind || "changed")}</span><span>${escapeHtml(item.at)}</span></div>
            <div class="file-path">${escapeHtml(item.path)}</div>
          </article>
        `, "No file changes yet.");
      }

      if (state.activeSessionTab === "actions") {
        renderItems(session.actions, (item) => `
          <article class="item">
            <div class="item-head"><span>${escapeHtml(item.status || item.label)}</span><span>${escapeHtml(item.at)}</span></div>
            <div class="action-command">${escapeHtml(item.command || item.label)}</div>
            ${item.output ? `<div class="item-body">${escapeHtml(item.output)}</div>` : ""}
          </article>
        `, "No actions yet.");
      }
    }

    function renderItems(items, template, emptyText) {
      $("#sessionBody").innerHTML = items.length ? items.map(template).join("") : `<div class="empty">${escapeHtml(emptyText)}</div>`;
      $("#sessionBody").scrollTop = $("#sessionBody").scrollHeight;
    }

    function setRunning(isRunning) {
      state.running = isRunning;
      $("#sendButton").disabled = isRunning;
      $("#messageInput").disabled = isRunning;
      $("#daemonPill").className = `pill ${isRunning ? "running" : state.health?.ok ? "online" : "failed"}`;
      $("#daemonPillText").textContent = isRunning ? "running" : state.health?.ok ? "online" : "offline";
    }

    function handleAgentEvent(session, event) {
      const at = now();
      if (event.type === "status") {
        session.actions.push({ label: "status", status: event.status || "status", command: event.text, at });
      } else if (event.type === "command") {
        session.actions.push({ label: "command", status: "started", command: event.text, at });
      } else if (event.type === "error") {
        session.actions.push({ label: "error", status: "failed", command: event.text || "error", at });
      } else if (event.type === "stderr" || event.type === "stdout") {
        session.actions.push({ label: event.type, status: event.type, command: event.type, output: event.text, at });
      } else if (event.type === "done") {
        session.status = event.status || "completed";
        session.actions.push({ label: "done", status: session.status, command: event.text, at });
      } else if (event.type === "codex") {
        const payload = event.payload || {};
        const item = payload.item;

        if (payload.type === "thread.started" && payload.thread_id) {
          session.messages.push({ role: "system", label: "thread", body: payload.thread_id, at });
        } else if (item?.type === "agent_message") {
          session.messages.push({ role: "codex", label: "codex", body: item.text || "", at });
        } else if (item?.type === "file_change") {
          for (const change of item.changes || []) {
            session.files.push({ path: change.path, kind: change.kind, at });
          }
        } else if (item?.type === "command_execution") {
          session.actions.push({
            label: "command",
            status: item.status || "command",
            command: item.command,
            output: item.aggregated_output || "",
            at
          });
        } else if (payload.type === "turn.completed" && payload.usage) {
          session.actions.push({
            label: "usage",
            status: "completed",
            command: `input ${payload.usage.input_tokens}, output ${payload.usage.output_tokens}`,
            at
          });
        }
      } else if (event.type === "claude") {
        if (event.kind === "thread_start") {
          session.messages.push({
            role: "system",
            label: "thread",
            body: `${event.sessionId}${event.model ? ` · ${event.model}` : ""}`,
            at
          });
        } else if (event.kind === "message") {
          session.messages.push({ role: "claude", label: "claude", body: event.text || "", at });
        } else if (event.kind === "tool_use") {
          session.actions.push({
            label: event.toolName || "tool",
            status: "started",
            command: event.input || "",
            at
          });
        } else if (event.kind === "tool_result") {
          session.actions.push({
            label: "result",
            status: event.isError ? "failed" : "completed",
            command: event.isError ? "tool error" : "tool result",
            output: event.output || "",
            at
          });
        } else if (event.kind === "file_change") {
          session.files.push({ path: event.path, kind: event.changeKind || "change", at });
        } else if (event.kind === "retry") {
          session.actions.push({
            label: "retry",
            status: "retrying",
            command: `attempt ${event.attempt}/${event.maxRetries} (${event.error || "unknown"})`,
            at
          });
        } else if (event.kind === "result") {
          const cost = (typeof event.totalCostUsd === "number" && event.totalCostUsd > 0)
            ? ` · $${event.totalCostUsd.toFixed(4)}`
            : "";
          session.actions.push({
            label: "usage",
            status: event.isError ? "failed" : "completed",
            command: `${event.numTurns || 0} turns · in ${event.usage?.input_tokens ?? 0} · out ${event.usage?.output_tokens ?? 0}${cost}`,
            at
          });
        }
      }

      renderSessions();
      if (!$("#sessionView").hidden) renderSessionView();
    }

    function renderHealth() {
      const select = $("#workspaceSelect");
      const health = state.health;

      if (!health?.ok) {
        select.innerHTML = `<option>Offline</option>`;
        $("#workspacePath").textContent = "Run node daemon.js on the Mac";
        $("#phoneUrl").textContent = "Open from iPhone: unavailable";
        renderUsage();
        renderHarnesses();
        setRunning(false);
        return;
      }

      const workspaces = health.workspaces || [];
      if (!state.workspaceId && workspaces[0]) state.workspaceId = workspaces[0].id;
      select.innerHTML = workspaces.map((workspace) => `
        <option value="${escapeHtml(workspace.id)}" ${workspace.id === state.workspaceId ? "selected" : ""}>
          ${escapeHtml(workspace.name)}
        </option>
      `).join("");

      const selected = selectedWorkspace();
      $("#workspacePath").textContent = selected ? selected.path : health.cwd;
      const phoneUrl = (health.urls || []).find((url) => !url.includes("localhost")) || location.href;
      $("#phoneUrl").textContent = `Open from iPhone: ${phoneUrl}`;
      renderUsage();
      renderHarnesses();
      setRunning(state.running);
    }

    function renderHarnesses() {
      const row = $("#harnessRow");
      const harnesses = state.health?.harnesses || [];
      // Pick a sensible default: the daemon's defaultHarness, falling back to first available.
      if (!state.harnessId) {
        const preferred = state.health?.defaultHarness;
        const firstAvailable = harnesses.find((h) => h.available)?.id;
        state.harnessId = (preferred && harnesses.find((h) => h.id === preferred && h.available)) ? preferred : firstAvailable || null;
      }
      // If the previously selected harness vanished (daemon restart, etc.), re-pick.
      if (state.harnessId && !harnesses.find((h) => h.id === state.harnessId && h.available)) {
        state.harnessId = harnesses.find((h) => h.available)?.id || null;
      }

      const pills = harnesses.map((harness) => {
        const classes = ["harness-pill"];
        if (harness.id === state.harnessId) classes.push("active");
        if (!harness.available) classes.push("unavailable");
        const title = harness.available
          ? (harness.version || harness.bin || harness.label)
          : `Not installed${harness.bin ? ` (looked for ${harness.bin})` : ""}`;
        return `<button type="button" class="${classes.join(" ")}" data-harness="${escapeHtml(harness.id)}" ${harness.available ? "" : "disabled"} title="${escapeHtml(title)}"><span class="dot"></span>${escapeHtml(harness.label)}</button>`;
      }).join("");

      row.innerHTML = `<span class="harness-label">agent</span>${pills}`;
    }

    function renderFsListing() {
      const listing = state.fsListing;
      if (!listing?.ok) {
        $("#currentFolder").textContent = listing?.error || "Could not read folder";
        $("#folderList").innerHTML = "";
        return;
      }

      state.fsPath = listing.path;
      $("#currentFolder").textContent = listing.path;
      $("#pathInput").value = listing.path;
      const parent = listing.parent ? `<button class="folder-chip" data-folder="${escapeHtml(listing.parent)}">..</button>` : "";
      const roots = (listing.roots || []).map((root) => `<button class="folder-chip" data-folder="${escapeHtml(root.path)}">${escapeHtml(root.name)}</button>`).join("");
      const folders = (listing.entries || []).slice(0, 80).map((entry) => `<button class="folder-chip" data-folder="${escapeHtml(entry.path)}">${escapeHtml(entry.name)}</button>`).join("");
      $("#folderList").innerHTML = `${parent}${roots}${folders}`;
    }

    async function loadFolder(folderPath) {
      const target = folderPath || state.fsPath || "";
      try {
        const response = await fetch(`/api/fs/list?path=${encodeURIComponent(target)}`, { cache: "no-store" });
        state.fsListing = await response.json();
        if (!response.ok || !state.fsListing.ok) throw new Error(state.fsListing.error || "Could not read folder");
      } catch (error) {
        state.fsListing = { ok: false, error: error.message };
      }
      renderFsListing();
    }

    async function createWorkspace() {
      const name = $("#newWorkspaceName").value.trim();
      if (!name) {
        toast("Enter a folder name first.");
        return;
      }

      try {
        const response = await fetch("/api/workspaces/create", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ parentPath: state.fsPath, name })
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || "Could not create workspace");
        $("#newWorkspaceName").value = "";
        state.workspaceId = data.workspace.id;
        await checkHealth();
        await loadFolder(data.workspace.path);
        toast("Workspace created on your Mac.");
      } catch (error) {
        toast(error.message);
      }
    }

    async function checkHealth() {
      try {
        const response = await fetch("/api/health", { cache: "no-store" });
        state.health = await response.json();
        if (!response.ok || !state.health.ok) throw new Error("health check failed");
      } catch (error) {
        state.health = { ok: false, error: error.message };
      }
      renderHealth();
      if (!state.fsPath) {
        const docs = state.health?.fsRoots?.find((root) => root.name === "Documents");
        await loadFolder(docs?.path || "");
      }
    }

    async function startSession(message) {
      if (state.eventSource) state.eventSource.close();
      const harnessId = state.harnessId;
      const harness = (state.health?.harnesses || []).find((h) => h.id === harnessId);
      if (!harness || !harness.available) {
        toast("No agent selected. Install Codex or Claude Code and refresh.");
        return;
      }

      const session = createLocalSession(message);
      session.harnessId = harnessId;
      session.harnessLabel = harness.label;
      setRunning(true);
      renderSessions();
      openSession(session.localId);

      try {
        const response = await fetch("/api/sessions/start", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ message, workspaceId: state.workspaceId, harness: harnessId })
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || `Could not start ${harness.label}`);

        session.remoteId = data.sessionId;
        session.workspace = data.workspace || session.workspace;
        session.status = "running";
        $("#sessionHint").textContent = `${data.sessionId} · ${harness.label} · ${data.workspace?.name || "workspace"}`;
        toast(`${harness.label} started on your Mac.`);
        renderSessions();
        renderSessionView();

        const source = new EventSource(`/api/sessions/events/${data.sessionId}`);
        state.eventSource = source;
        source.onmessage = (event) => {
          const parsed = JSON.parse(event.data);
          handleAgentEvent(session, parsed);
          if (parsed.type === "done") {
            source.close();
            setRunning(false);
          }
        };
        source.onerror = () => {
          session.status = "failed";
          session.actions.push({ label: "connection", status: "failed", command: "Event stream disconnected.", at: now() });
          source.close();
          setRunning(false);
          renderSessions();
          renderSessionView();
        };
      } catch (error) {
        session.status = "failed";
        session.messages.push({ role: "system", label: "error", body: error.message, at: now() });
        setRunning(false);
        renderSessions();
        renderSessionView();
      }
    }

    $("#workspaceSelect").addEventListener("change", (event) => {
      state.workspaceId = event.target.value;
      renderHealth();
    });

    $("#sessionStrip").addEventListener("click", (event) => {
      const card = event.target.closest("[data-session-id]");
      if (card) openSession(card.dataset.sessionId);
    });

    $("#closeSession").addEventListener("click", closeSession);

    document.querySelectorAll("[data-session-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        state.activeSessionTab = button.dataset.sessionTab;
        renderSessionView();
      });
    });

    $("#folderList").addEventListener("click", (event) => {
      const button = event.target.closest("[data-folder]");
      if (button) loadFolder(button.dataset.folder);
    });

    $("#homeFolder").addEventListener("click", () => {
      const home = state.health?.fsRoots?.find((root) => root.name === "Home");
      loadFolder(home?.path || "");
    });

    $("#parentFolder").addEventListener("click", () => {
      if (state.fsListing?.parent) loadFolder(state.fsListing.parent);
    });

    $("#jumpFolder").addEventListener("click", () => {
      loadFolder($("#pathInput").value.trim());
    });

    $("#pathInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        loadFolder($("#pathInput").value.trim());
      }
    });

    $("#createWorkspace").addEventListener("click", createWorkspace);

    $("#chatForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const message = $("#messageInput").value.trim();
      if (!message) {
        toast("Write a message first.");
        return;
      }
      startSession(message);
    });

    $("#harnessRow").addEventListener("click", (event) => {
      const pill = event.target.closest("[data-harness]");
      if (!pill || pill.disabled) return;
      state.harnessId = pill.dataset.harness;
      renderHarnesses();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }

    renderSessions();
    checkHealth();
  </script>
</body>
</html>
